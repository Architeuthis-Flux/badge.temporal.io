; PlatformIO Project Configuration File
;
; Public build target:
;   replay2026 - Replay 2026 Badge firmware for the final ESP32-S3 hardware
;
; Build: pio run -e replay2026
; Flash: pio run -e replay2026 -t upload
; Upload WAD/filesystem: pio run -e replay2026 -t uploadfs
; clangd: pio run -e replay2026 -t compiledb

[platformio]
boards_dir = boards
default_envs = replay2026

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board_build.filesystem = fatfs
board_build.embed_files =
    ../data/out/bundle.bin
extra_scripts =
    pre:scripts/inject_version.py
    pre:scripts/generate_build_wifi_config.py
    pre:scripts/generate_startup_files.py
build_src_filter =
    +<*>
    -<JumperlOSstuff/>
    -<modular/>
    -<ble/>
    +<../micropython/usermods/temporalbadge/>
build_flags_common =
    '-DFFCONF_H="ffconf.h"'
    -Imicropython/usermods/temporalbadge
    -DBADGE_BYPASS_PAIRING
    ; BLE proximity is compiled out for offline firmware. To restore it later,
    ; add -DBADGE_ENABLE_BLE_PROXIMITY and re-add +<ble/> to build_src_filter.

[env:replay2026]
extends = base
board = esp32-s3-devkitc-1-n16r8v
board_build.partitions = partitions_replay_16MB_doom.csv
board_build.f_cpu = 240000000L
; PlatformIO does not propagate board_build.embed_files via `extends`,
; so the bundle.bin embed has to be declared on every env that builds
; src/api/DataCache.cpp (which references _binary_bundle_bin_start /
; _binary_bundle_bin_end). Without this redeclaration the link fails
; with "undefined reference to _binary_bundle_bin_*".
board_build.embed_files =
    ../data/out/bundle.bin
    build_assets/partitions_ver2.bin
extra_scripts =
    ${base.extra_scripts}
    pre:scripts/upload_doom_wad.py
    pre:scripts/gen_expanded_partitions.py
    post:scripts/normalize_bundle_symbols.py
; Match the final badge hardware USB CDC/JTAG mode, but expose Serial on USB
; as soon as the app firmware boots.
build_unflags =
    -DARDUINO_USB_CDC_ON_BOOT=0
build_flags =
    ${base.build_flags_common}
    -DHARDWARE_ECHO
    -DBADGE_HAS_DOOM
    -DFEATURE_SOUND
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Ilib/doomgeneric/src
    -DDOOMGENERIC_RESX=160
    -DDOOMGENERIC_RESY=100

    ; OTA + Community Apps registry URLs are derived from REPO_OWNER_SLUG in
    ; firmware/src/infra/RepoUrls.h (set to temporal-community/badge.temporal.io).
    ; To point a fork elsewhere, change that single header — no build flag needed.
    '-DOTA_ASSET_NAME="firmware.bin"'

    ; Public replay2026 intentionally includes developer-friendly behavior:
    ; diagnostics, editable badge info, MicroPython dev affordances, and
    ; filesystem reloads for community app work.
    -DBADGE_DEV_MENU
    -DNDEBUG
    -DBADGE_ALLOW_BADGE_INFO_EDIT
    -DBADGE_ENABLE_MP_DEV
    -DRELOAD_FILESYSTEM

build_src_filter =
    ${base.build_src_filter}
    +<../lib/doomgeneric/src/>
lib_deps =
    adafruit/Adafruit IS31FL3731 Library@^2.0.2
    sparkfun/SparkFun LIS2DH12 Arduino Library@^1.0.3
    olikraus/U8g2@^2.35.19
    bblanchon/ArduinoJson@^6.21.5


; ── Replay 2026 Expanded — opt-in 16 MB layout with bigger OTA slots + ffat ──
;
; Same firmware as `replay2026`, but uses partitions_replay_16MB_ver2.csv,
; which reclaims the unused 2 MB and grows the OTA app slots and the ffat
; data partition.
;
; NOT OTA-COMPATIBLE WITH THE DEFAULT `replay2026` BUILD. The partition table
; lives at flash offset 0x8000 and is not rewritten by an OTA app-slot install,
; so a badge on the default layout cannot reach this layout via OTA. Use this
; env only when USB-flashing a fresh badge from day one:
;
;   cd firmware && ./scripts/erase_and_flash_expanded.sh
;
; (Full chip erase first, then `pio run -e replay2026-expanded -t upload` and
; `-t uploadfs`. A bare upload without erase keeps the old partition table.)
[env:replay2026-expanded]
extends = env:replay2026
board_build.partitions = partitions_replay_16MB_ver2.csv
build_flags =
    ${env:replay2026.build_flags}
    ; Compile-time marker for the expanded layout. Runtime code detects the
    ; layout from the mounted ffat partition (BadgeOTA::isExpandedPartitionLayout)
    ; and OTA serves the same firmware.bin to both layouts.
    -DBADGE_PARTITIONS_EXPANDED
