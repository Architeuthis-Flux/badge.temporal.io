name: release-firmware

# Builds the public Replay 2026 Badge OTA binary and factory image, then
# attaches both to a GitHub release.
#
# firmware.bin is consumed by badge OTA. replay2026-factory-16MB.bin is a full
# 16 MB factory flash: bootloader, partition table, application firmware, FAT
# filesystem, and firmware/initial_filesystem/doom1.wad.
#
# Triggers:
#   - Automatically when a v* tag is pushed.
#   - Automatically when a release is published.
#   - Manually via the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the asset to (must already exist)"
        required: true
      force_rebuild:
        description: "Build even if firmware release inputs have not changed since the previous v* tag"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    name: Build Replay 2026 firmware artifacts
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        run: |
          case "${{ github.event_name }}" in
            push)
              echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Prepare release metadata
        id: release
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          firmware_version="$(tr -d '[:space:]' < firmware/VERSION)"
          tag_version="${RELEASE_TAG#v}"

          if [ "$tag_version" != "$firmware_version" ]; then
            echo "::error::Release tag '$RELEASE_TAG' does not match firmware/VERSION '$firmware_version'. Use tag v$firmware_version or $firmware_version."
            exit 1
          fi

          echo "version=${firmware_version}" >> "$GITHUB_OUTPUT"
          echo "tag_version=${tag_version}" >> "$GITHUB_OUTPUT"

          mkdir -p artifacts/release
          {
            printf '## Replay 2026 Badge v%s\n\n' "$firmware_version"
            printf 'Firmware release v%s for the Replay 2026 Badge.\n\n' "$firmware_version"
            printf '### Downloads\n\n'
            printf -- '- `firmware.bin`: OTA update image. The badge firmware updater looks for this exact asset name on the latest GitHub release.\n'
            printf -- '- `replay2026-factory-16MB.bin`: complete 16 MB factory image for Ignition, first-time setup, or recovery. This includes bootloader, partition table, firmware, filesystem, bundled apps, docs, and the DOOM shareware data file.\n\n'
            printf -- '- `community_apps.json`: generated Community Apps registry fetched by badges over WiFi.\n\n'
            printf '### Flashing\n\n'
            printf 'Use Ignition for the recommended flashing path:\n\n'
            printf '```bash\n'
            printf 'cd ignition\n'
            printf './start.sh --latest-release\n'
            printf '```\n\n'
            printf 'Use `./start.sh --release-tag %s` to pin this release, or `./start.sh --no-build --factory-image ~/Downloads/replay2026-factory-16MB.bin` for a manually downloaded image.\n\n' "$tag"
            printf 'Developers can also build and flash from `firmware/` with PlatformIO using the `replay2026` environment.\n\n'
            printf '### Notes\n\n'
            printf -- '- `doom1.wad` is freely redistributable shareware game data with separate terms; it is not MIT-licensed source code.\n'
            printf -- '- See the repository docs for Ignition setup, OTA behavior, firmware development, hardware files, and third-party notices.\n'
          } > artifacts/release/release-notes.md

      - name: Check release input changes
        id: release_scope
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild || false }}
        run: |
          set -euo pipefail

          if [ "${FORCE_REBUILD}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual force rebuild" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_tag="$(git tag --merged HEAD --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)"
          if [ -z "$previous_tag" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=no previous release tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed="$(git diff --name-only "${previous_tag}..HEAD" -- \
            firmware \
            data \
            community_apps \
            .github/workflows/release-firmware.yml \
            release-assets || true)"

          if [ -n "$changed" ]; then
            {
              echo "should_build=true"
              echo "reason<<EOF"
              echo "Release inputs changed since ${previous_tag}:"
              echo "$changed"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "should_build=false"
              echo "reason=No firmware, embedded data, or release workflow inputs changed since ${previous_tag}."
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Skip unchanged release
        if: steps.release_scope.outputs.should_build != 'true'
        run: |
          echo "${{ steps.release_scope.outputs.reason }}"

      - name: Set up Python
        if: steps.release_scope.outputs.should_build == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ".github/workflows/release-firmware.yml"

      - name: Cache PlatformIO core + toolchains
        if: steps.release_scope.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        if: steps.release_scope.outputs.should_build == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio esptool
          mkdir -p "$HOME/.platformio/penv/bin"
          ln -sf "$(command -v pio)" "$HOME/.platformio/penv/bin/pio"
          ln -sf "$(command -v esptool)" "$HOME/.platformio/penv/bin/esptool"

      - name: Cache PlatformIO build objects
        if: steps.release_scope.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            firmware/.pio/build
            firmware/.pio/libdeps
          key: pio-build-${{ runner.os }}-replay2026-${{ hashFiles('firmware/platformio.ini', 'firmware/boards/**', 'firmware/src/**', 'firmware/lib/**', 'firmware/micropython/**', 'firmware/initial_filesystem/**', 'firmware/scripts/**') }}
          restore-keys: |
            pio-build-${{ runner.os }}-replay2026-

      - name: Require bundled DOOM shareware data
        if: steps.release_scope.outputs.should_build == 'true'
        run: |
          test -f firmware/initial_filesystem/doom1.wad

      - name: Generate Community Apps registry
        if: steps.release_scope.outputs.should_build == 'true'
        run: |
          python3 firmware/scripts/generate_startup_files.py
          test -f firmware/build/community_apps.json
          python3 -m json.tool firmware/build/community_apps.json > /dev/null

      - name: Build firmware and filesystem
        if: steps.release_scope.outputs.should_build == 'true'
        run: |
          cd firmware
          [ -f settings.txt ] || cp settings.txt.example settings.txt
          pio run -e replay2026
          mkdir -p ../artifacts/release
          cp .pio/build/replay2026/firmware.bin ../artifacts/release/firmware.bin
          pio run -e replay2026 -t buildfs

      - name: Verify firmware release binary
        if: steps.release_scope.outputs.should_build == 'true'
        run: |
          python3 firmware/scripts/verify_firmware_version.py \
            artifacts/release/firmware.bin \
            "${{ steps.release.outputs.version }}"
          size="$(wc -c < artifacts/release/firmware.bin | tr -d '[:space:]')"
          max_slot=4063232
          if [ "$size" -gt "$max_slot" ]; then
            echo "::error::firmware.bin is ${size} bytes, larger than the OTA app slot (${max_slot} bytes)."
            exit 1
          fi

      - name: Build factory image
        if: steps.release_scope.outputs.should_build == 'true'
        run: |
          cd firmware
          ./make_factory.sh replay2026

      - name: Stage release artifacts
        if: steps.release_scope.outputs.should_build == 'true'
        run: |
          mkdir -p artifacts/release
          test -f artifacts/release/firmware.bin
          cp firmware/factory_replay2026_16MB.bin artifacts/release/replay2026-factory-16MB.bin
          cp firmware/build/community_apps.json artifacts/release/community_apps.json

      - name: List release artifacts
        if: steps.release_scope.outputs.should_build == 'true'
        run: ls -lh artifacts/release/

      - name: Upload firmware artifacts to release
        if: steps.release_scope.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Replay 2026 Badge v${{ steps.release.outputs.version }}
          body_path: artifacts/release/release-notes.md
          files: |
            artifacts/release/firmware.bin
            artifacts/release/replay2026-factory-16MB.bin
            artifacts/release/community_apps.json
          fail_on_unmatched_files: true
